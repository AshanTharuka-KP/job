<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTracker Pro - Ultimate Edition</title>
    <style>
        :root {
            --primary: #4361ee;
            --header-grad: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            --danger: #ef4444;
        }

        body { font-family: 'Inter', 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1250px; margin: auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-top: 0; font-weight: 700; }
        
        .mode-selector { background: var(--header-grad); color: white; padding: 15px 25px; border-radius: 12px; margin-bottom: 25px; display: flex; gap: 20px; align-items: center; justify-content: space-between; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }
        .mode-selector label { cursor: pointer; background: rgba(255, 255, 255, 0.1); padding: 6px 15px; border-radius: 8px; transition: 0.3s; font-weight: 500; }
        
        .settings-box { background: #fdf2f2; border: 1px solid #feb2b2; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: none; }
        .edit-mode .settings-box { display: block; }

        .manager-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .manager-box { border: 1px solid #e2e8f0; padding: 15px; border-radius: 12px; background: #fff; transition: 0.3s; }
        .manager-box.error { border-color: var(--danger); box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2); }
        
        .add-controls { display: none; gap: 8px; margin-bottom: 10px; }
        .edit-mode .add-controls { display: flex; }

        .pill-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; min-height: 40px; }
        .pill { background: #f0f4ff; padding: 6px 12px; border-radius: 20px; border: 1px solid #d1d9e6; display: flex; align-items: center; gap: 8px; font-size: 0.9em; color: #1e3a8a; font-weight: 500; }
        .delete-btn { color: #f72585; cursor: pointer; display: none; font-weight: bold; }
        .edit-mode .delete-btn { display: inline; }

        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; transition: 0.2s; }
        input.error { border-color: var(--danger); background-color: #fef2f2; }
        label { font-size: 0.8rem; font-weight: bold; color: #64748b; display: block; margin-bottom: 5px; text-transform: uppercase; }
        
        .finalize-box { background: #f8fafc; border: 2px solid #e2e8f0; padding: 20px; border-radius: 12px; margin-bottom: 20px; transition: 0.3s; }
        .finalize-box.locked { opacity: 0.6; background: #f1f5f9; }
        .finalize-box.unlocked { border-color: #8b5cf6; background: #f5f3ff; }

        .summary-report { background: #1e293b; color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; display: none; grid-template-columns: repeat(3, 1fr); gap: 20px; text-align: center; }
        .summary-item span { font-size: 0.8em; opacity: 0.8; text-transform: uppercase; display: block; }
        .summary-item b { font-size: 1.5em; color: #38bdf8; display: block; margin-top: 5px; }

        .controls { display: flex; flex-direction: column; gap: 10px; padding: 20px; background: #f8fafc; border-radius: 12px; margin: 20px 0; border: 1px solid #e2e8f0; }
        #previewBox { background: #dcfce7; color: #166534; padding: 10px; border-radius: 8px; font-weight: bold; display: none; }
        
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:disabled { background: #cbd5e1 !important; cursor: not-allowed; color: #fff !important; }
        
        #startBtn { background: #10b981; color: white; }
        #finishArea { display: none; align-items: center; gap: 15px; }
        #finishBtn { background: #f43f5e; color: white; display: none; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .stat-box { padding: 25px; border-radius: 16px; color: white; text-align: center; }

        .date-group { margin-bottom: 15px; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
        .date-header { background: #f1f5f9; padding: 15px 20px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; }
        .date-content { display: none; overflow-x: auto; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; min-width: 1000px; }
        th, td { border-bottom: 1px solid #f1f5f9; padding: 12px; text-align: center; }
        #timerDisplay { font-size: 1.6em; font-weight: bold; margin-left: auto; font-family: monospace; }

        body.active-duty .w-check, body.active-duty .l-check, body.active-duty #assignedHours { pointer-events: none; opacity: 0.6; }

        @page { size: A4 landscape; margin: 10mm; }
        @media print {
            .mode-selector, .manager-section, .input-grid, .controls, .finalize-box, .settings-box, .btn-danger, h2, .export-controls, h3 { display: none !important; }
            .container { box-shadow: none !important; border: none !important; width: 100% !important; max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
            .summary-report { display: grid !important; background: white !important; color: black !important; border: 1px solid #000 !important; margin-bottom: 20px !important; }
            .summary-item b { color: black !important; }
            .date-group { border: 1px solid #ddd !important; border-radius: 0 !important; margin-bottom: 10px !important; page-break-inside: avoid !important; }
            .date-header { background: #f9f9f9 !important; color: black !important; border-bottom: 1px solid #ddd !important; font-size: 10pt !important; padding: 8px 12px !important; }
            .date-content { display: block !important; overflow: visible !important; width: 100% !important; }
            table { min-width: 100% !important; width: 100% !important; table-layout: fixed !important; font-size: 7.5pt !important; }
            th, td { padding: 4px 2px !important; border: 0.5pt solid #ccc !important; word-wrap: break-word !important; overflow: hidden !important; }
            th { background: #eee !important; font-weight: bold !important; }
            * { overflow: visible !important; -webkit-print-color-adjust: exact !important; }
        }
    </style>
</head>
<body class="live-mode">

<div class="container">
    <h2>WorkTracker Pro</h2>

    <div class="mode-selector">
        <div>
            <strong>Dashboard</strong> &nbsp;
            <label><input type="radio" name="sysMode" value="live" checked onclick="setMode('live')"> LIVE</label>
            <label><input type="radio" name="sysMode" value="edit" onclick="setMode('edit')"> EDITOR</label>
        </div>
        <button style="background:#ef4444; color:white; display:none;" class="btn-danger" onclick="clearAllData()">WIPE DATA</button>
    </div>

    <div class="settings-box">
        <label>Default Hourly Rate</label>
        <div style="display:flex; align-items:center; gap:10px;">
            <input type="number" id="defaultRateInput" style="width:100px;" onchange="updateDefaultRate()">
            <small style="color:#c53030; font-weight:bold;">(Auto-saved globally)</small>
        </div>
    </div>

    <div class="summary-report" id="monthlySummary">
        <div class="summary-item"><span>Total Finalized Earnings</span><b id="sumNet">$0.00</b></div>
        <div class="summary-item"><span>Total Clocked Hours</span><b id="sumHours">0h 0m</b></div>
        <div class="summary-item"><span>Unique Work Days</span><b id="sumDays">0 Days</b></div>
    </div>

    <div class="finalize-box" id="finalizeBox">
        <label>Monthly Finalization</label>
        <p id="finalizeStatus" style="font-size: 0.85em; margin-bottom: 10px; color: #64748b;">Checking status...</p>
        <div style="display: flex; align-items: center; gap: 15px;">
            <input type="checkbox" id="confirmFinalize" disabled style="width: 22px; height: 22px;" onclick="toggleFinalizeBtn()">
            <label for="confirmFinalize" style="margin:0; text-transform: none;">I confirm that all work records are finalized.</label>
            <button id="finalizeBtn" disabled style="background:#8b5cf6; color:white;" onclick="finalizeMonth()">Finalize Records</button>
        </div>
    </div>

    <div class="manager-section">
        <div class="manager-box" id="workerContainer">
            <label>Worker Selection (Compulsory)</label>
            <div class="add-controls"><input type="text" id="workerIn"><button style="background:#4361ee; color:white;" onclick="addItem('workers', 'workerIn')">ADD</button></div>
            <div class="pill-container" id="workerList"></div>
        </div>
        <div class="manager-box">
            <label>Location Selection</label>
            <div class="add-controls"><input type="text" id="locIn"><button style="background:#4361ee; color:white;" onclick="addItem('locations', 'locIn')">ADD</button></div>
            <div class="pill-container" id="locationList"></div>
        </div>
    </div>

    <div class="input-grid">
        <div><label>Assigned Hours (Compulsory)</label><input type="number" id="assignedHours" oninput="updateTeamCount()"></div>
        <div><label>Rate</label><input type="number" id="hourlyRate"></div>
        <div><label>Team Size</label><input type="number" id="numWorkersDisplay" value="0" readonly style="background:#f8fafc; color:var(--primary); font-weight:bold;"></div>
    </div>

    <div class="controls">
        <div id="previewBox">Duty Preview: <span id="previewValue">0h 0m</span></div>
        <div style="display:flex; align-items:center; gap:20px;">
            <button id="startBtn" onclick="startDuty()">START DUTY</button>
            <div id="finishArea">
                <input type="checkbox" id="confirmFinish" style="width:20px; height:20px;" onclick="handleCheckbox()"> 
                <span style="font-weight:600; margin-left: 5px;">Work Finished</span>
                <button id="finishBtn" onclick="finishDuty()" style="margin-left: 10px;">FINISH DUTY</button>
            </div>
            <div id="timerDisplay">00:00:00</div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-box" style="background: #3b82f6;"><small>Monthly Net</small><div id="monthlyTotal">0.00</div></div>
        <div class="stat-box" style="background: #8e44ad;"><small>Forecast</small><div id="predictedSalary">Calculating...</div></div>
    </div>

    <div class="history-section">
        <div class="export-controls" style="background:#f8fafc; padding:20px; border-radius:12px; margin-bottom:20px; display:flex; gap:10px; align-items:flex-end; border:1px solid #e2e8f0; flex-wrap:wrap;">
            <div><label>Email</label><input type="email" id="targetEmail" onchange="saveEmail()"></div>
            <div><label>From</label><input type="date" id="exportFrom"></div>
            <div><label>To</label><input type="date" id="exportTo"></div>
            <button style="background:#1e293b; color:white;" onclick="exportFilteredCSV()">EXCEL</button>
            <button style="background:#6366f1; color:white;" onclick="preparePrint()">PDF</button>
            <button style="background:#f59e0b; color:white;" onclick="sendEmailReport()">EMAIL</button>
        </div>
        <div id="historyGroups"></div>
    </div>
</div>

<script>
    let timerInterval;
    let data = {
        workers: JSON.parse(localStorage.getItem('m_workers')) || [],
        locations: JSON.parse(localStorage.getItem('m_locations')) || [],
        records: JSON.parse(localStorage.getItem('m_records_final')) || [],
        email: localStorage.getItem('m_saved_email') || "",
        defaultRate: localStorage.getItem('m_default_rate') || 7
    };

    function setMode(mode) { 
        document.body.className = mode + '-mode'; 
        document.querySelector('.btn-danger').style.display = (mode === 'edit') ? 'inline-block' : 'none';
    }

    function updateDefaultRate() {
        const val = document.getElementById('defaultRateInput').value;
        localStorage.setItem('m_default_rate', val);
        data.defaultRate = val;
        document.getElementById('hourlyRate').value = val;
    }

    function updateTeamCount() {
        const checked = document.querySelectorAll('.w-check:checked').length;
        document.getElementById('numWorkersDisplay').value = checked;
        
        document.getElementById('assignedHours').classList.remove('error');
        document.getElementById('workerContainer').classList.remove('error');

        const assigned = parseFloat(document.getElementById('assignedHours').value) || 0;
        if (checked > 0 && assigned > 0) {
            const h = Math.floor(assigned/checked);
            const m = Math.round(((assigned/checked) - h) * 60);
            document.getElementById('previewValue').innerText = h + "h " + m + "m";
            document.getElementById('previewBox').style.display = 'block';
        } else { 
            document.getElementById('previewBox').style.display = 'none'; 
        }
    }

    function startDuty() {
        const workerCount = document.querySelectorAll('.w-check:checked').length;
        const assigned = parseFloat(document.getElementById('assignedHours').value) || 0;
        
        let isValid = true;
        if (workerCount === 0) { document.getElementById('workerContainer').classList.add('error'); isValid = false; }
        if (assigned <= 0) { document.getElementById('assignedHours').classList.add('error'); isValid = false; }

        if (!isValid) { alert("Missing Compulsory Info: Select workers and enter assigned hours."); return; }

        const startTime = new Date().getTime();
        const selectedWorkers = Array.from(document.querySelectorAll('.w-check:checked')).map(cb => cb.value);
        const selectedLocs = Array.from(document.querySelectorAll('.l-check:checked')).map(cb => cb.value);

        const session = { startTime, assigned, hourlyRate: document.getElementById('hourlyRate').value, workers: selectedWorkers, locations: selectedLocs };
        
        // Save to browser memory immediately so it survives a refresh/close
        localStorage.setItem('active_session', JSON.stringify(session));
        initTimer(startTime);
    }

    function initTimer(start) {
        document.body.classList.add('active-duty');
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('finishArea').style.display = 'flex';
        
        const updateClock = () => {
            let diff = new Date().getTime() - start;
            let h = Math.floor(diff / (1000 * 60 * 60));
            let m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            let s = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById('timerDisplay').innerText = 
                h.toString().padStart(2, '0') + ":" + 
                m.toString().padStart(2, '0') + ":" + 
                s.toString().padStart(2, '0');
        };
        
        updateClock(); // Call immediately to prevent 1-sec delay
        timerInterval = setInterval(updateClock, 1000);
    }

    function checkActiveSession() {
        const session = JSON.parse(localStorage.getItem('active_session'));
        if (session) {
            document.getElementById('assignedHours').value = session.assigned;
            document.getElementById('hourlyRate').value = session.hourlyRate;
            
            // Reapply previous selections
            document.querySelectorAll('.w-check').forEach(cb => { if (session.workers.includes(cb.value)) cb.checked = true; });
            document.querySelectorAll('.l-check').forEach(cb => { if (session.locations.includes(cb.value)) cb.checked = true; });

            updateTeamCount();
            initTimer(session.startTime); // Timer instantly resumes based on exact absolute past time
        }
    }

    function finishDuty() {
        const session = JSON.parse(localStorage.getItem('active_session'));
        if(!session) return location.reload(); // Fallback if session corrupted

        clearInterval(timerInterval);
        
        const nowTime = new Date().getTime();
        const startTime = session.startTime;
        
        // Mathematical absolute duration (Resilient against closed browsers)
        let diff = nowTime - startTime;
        let durH = Math.floor(diff / (1000 * 60 * 60));
        let durM = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        let durS = Math.floor((diff % (1000 * 60)) / 1000);
        let finalDurationStr = `${durH.toString().padStart(2, '0')}:${durM.toString().padStart(2, '0')}:${durS.toString().padStart(2, '0')}`;

        const dutyDec = session.assigned / session.workers.length;
        const now = new Date();
        const start = new Date(startTime);
        const dateStr = `${start.getFullYear()}/${start.getMonth() + 1}/${start.getDate()} ${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][start.getDay()]}`;
        
        const rateFloat = parseFloat(session.hourlyRate) || 0;

        data.records.push({
            dateLabel: dateStr, 
            rawDate: start.toISOString(),
            start: start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            end: now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            duration: finalDurationStr,
            dutyTime: Math.floor(dutyDec) + "h " + Math.round((dutyDec % 1) * 60) + "m",
            location: session.locations.join(", "), 
            rate: rateFloat.toFixed(2), 
            earning: (rateFloat * dutyDec).toFixed(2),
            team: session.workers.join(", "), 
            finalized: false
        });

        localStorage.setItem('m_records_final', JSON.stringify(data.records));
        localStorage.removeItem('active_session');
        location.reload();
    }

    function renderLists() {
        const wContainer = document.getElementById('workerList');
        const lContainer = document.getElementById('locationList');
        wContainer.innerHTML = '';
        data.workers.forEach(name => {
            wContainer.innerHTML += `<div class="pill"><input type="checkbox" class="w-check" value="${name}" onchange="updateTeamCount()"><span>${name}</span><span class="delete-btn" onclick="removeItem('workers','${name}')">×</span></div>`;
        });
        lContainer.innerHTML = '';
        data.locations.forEach(loc => {
            lContainer.innerHTML += `<div class="pill"><input type="checkbox" class="l-check" value="${loc}"><span>${loc}</span><span class="delete-btn" onclick="removeItem('locations','${loc}')">×</span></div>`;
        });
    }

    function renderHistory() {
        const container = document.getElementById('historyGroups');
        let monthTotal = 0;
        const groups = {};
        data.records.forEach(r => {
            monthTotal += parseFloat(r.earning);
            if (!groups[r.dateLabel]) groups[r.dateLabel] = [];
            groups[r.dateLabel].push(r);
        });
        Object.keys(groups).reverse().forEach(date => {
            const records = groups[date];
            const locked = records.some(r => r.finalized);
            container.innerHTML += `
                <div class="date-group">
                    <div class="date-header" onclick="toggleGroup(this)">
                        <span>${date} ${locked ? '<small style="color:#10b981;">(LOCKED)</small>' : ''}</span>
                        <span>${records.length} JOBS ↓</span>
                    </div>
                    <div class="date-content">
                        <table>
                            <thead><tr><th>Start</th><th>End</th><th>Duration</th><th>Duty</th><th>Rate</th><th>Loc.</th><th>Net</th><th>Team</th></tr></thead>
                            <tbody>${records.map(r => `<tr><td>${r.start}</td><td>${r.end}</td><td>${r.duration}</td><td>${r.dutyTime}</td><td>$${r.rate}</td><td>${r.location}</td><td>$${r.earning}</td><td>${r.team}</td></tr>`).join('')}</tbody>
                        </table>
                    </div>
                </div>`;
        });
        document.getElementById('monthlyTotal').innerText = monthTotal.toFixed(2);
        document.getElementById('hourlyRate').value = data.defaultRate;
        document.getElementById('defaultRateInput').value = data.defaultRate;
        document.getElementById('targetEmail').value = data.email;
    }

    function updateFinalizeUI() {
        const today = new Date();
        const tomorrow = new Date(today);
        tomorrow.setDate(today.getDate() + 1);
        const isLastDay = tomorrow.getMonth() !== today.getMonth();

        const hasPastUnfinalized = data.records.some(r => {
            if (r.finalized) return false;
            const rDate = new Date(r.rawDate);
            return rDate.getMonth() !== today.getMonth() || rDate.getFullYear() !== today.getFullYear();
        });

        const box = document.getElementById('finalizeBox');
        const status = document.getElementById('finalizeStatus');
        const check = document.getElementById('confirmFinalize');

        if (isLastDay || hasPastUnfinalized) {
            box.classList.add('unlocked');
            box.classList.remove('locked');
            status.innerText = hasPastUnfinalized ? "UNLOCKED: You have unfinalized records from past months." : "UNLOCKED: End of month reached.";
            status.style.color = "#d9480f";
            check.disabled = false;
        } else {
            box.classList.add('locked');
            box.classList.remove('unlocked');
            status.innerText = "LOCKED: Available on the last day of the month.";
            check.disabled = true;
        }
    }

    function finalizeMonth() {
        const now = new Date();
        let totalNet = 0, totalMinutes = 0, uniqueDays = new Set();
        data.records.forEach(r => {
            const rDate = new Date(r.rawDate);
            if (!r.finalized && (rDate.getMonth() === now.getMonth() || rDate.getMonth() !== now.getMonth())) {
                r.finalized = true;
                totalNet += parseFloat(r.earning);
                
                const hMatch = r.dutyTime.match(/(\d+)h/);
                const mMatch = r.dutyTime.match(/(\d+)m/);
                const h = hMatch ? parseInt(hMatch[1]) : 0;
                const m = mMatch ? parseInt(mMatch[1]) : 0;
                totalMinutes += (h * 60) + m;
                
                uniqueDays.add(rDate.toDateString());
            }
        });

        document.getElementById('monthlySummary').style.display = 'grid';
        document.getElementById('sumNet').innerText = "$" + totalNet.toFixed(2);
        document.getElementById('sumHours').innerText = `${Math.floor(totalMinutes/60)}h ${totalMinutes%60}m`;
        document.getElementById('sumDays').innerText = `${uniqueDays.size} Days`;
        
        localStorage.setItem('m_records_final', JSON.stringify(data.records));
        document.getElementById('finalizeBox').style.display = 'none';
        
        setTimeout(() => location.reload(), 3000); 
    }

    function exportFilteredCSV() {
        const fromDate = document.getElementById('exportFrom').value;
        const toDate = document.getElementById('exportTo').value;
        
        let filtered = data.records;
        if (fromDate && toDate) {
            const start = new Date(fromDate);
            const end = new Date(toDate);
            end.setHours(23,59,59);
            filtered = data.records.filter(r => {
                const rDate = new Date(r.rawDate);
                return rDate >= start && rDate <= end;
            });
        }
        
        if(filtered.length === 0) { alert("No data to export."); return; }

        let csv = "Date,Start,End,Clocked Duration,Duty Time,Hourly Rate,Location,Net Earning,Team\n";
        filtered.forEach(r => csv += `"${r.dateLabel}","${r.start}","${r.end}","${r.duration}","${r.dutyTime}","$${r.rate}","${r.location}","$${r.earning}","${r.team}"\n`);
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `Full_Report.csv`; a.click();
    }

    // Helpers
    function addItem(type, id) { const v = document.getElementById(id).value.trim(); if(v && !data[type].includes(v)) { data[type].push(v); localStorage.setItem('m_'+type, JSON.stringify(data[type])); document.getElementById(id).value=''; renderLists(); } }
    function removeItem(type, v) { data[type] = data[type].filter(i => i !== v); localStorage.setItem('m_'+type, JSON.stringify(data[type])); renderLists(); }
    function toggleGroup(h) { h.nextElementSibling.style.display = (h.nextElementSibling.style.display === "block") ? "none" : "block"; }
    function saveEmail() { localStorage.setItem('m_saved_email', document.getElementById('targetEmail').value); }
    function toggleFinalizeBtn() { document.getElementById('finalizeBtn').disabled = !document.getElementById('confirmFinalize').checked; }
    function handleCheckbox() { document.getElementById('finishBtn').style.display = document.getElementById('confirmFinish').checked ? 'inline-block' : 'none'; }
    function clearAllData() { if (confirm("Delete everything forever?")) { localStorage.clear(); location.reload(); } }
    function sendEmailReport() { window.location.href = `mailto:${data.email}?subject=Work Report&body=Total MTD Earnings: ${document.getElementById('monthlyTotal').innerText}`; }
    function preparePrint() { document.querySelectorAll('.date-content').forEach(c => c.style.display = 'block'); window.print(); document.querySelectorAll('.date-content').forEach(c => c.style.display = 'none'); }

    // Initialization
    renderLists();
    renderHistory();
    checkActiveSession();
    updateFinalizeUI();
</script>
</body>
</html>
